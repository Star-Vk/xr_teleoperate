urdf_path: ../../zqz1_ws/urdf/QingYun_Robot_Description/qingyun_z1_A_rev_1_0_description/urdf/qingyun_z1_A_rev_1_0.urdf

robot:
  base_link: base_link
  controlled_arms:
    left:
      enabled: true
      tip_link: lp_elbow_pitch_link
      joints:
        - lw_shoulder_pitch
        - lw_arm_roll
        - lw_arm_yaw
        - lw_elbow_pitch
      home_joint_positions: [0.0, 0.0, 0.0, 0.0]
      tool_offset_xyz: [0.0, 0.0, -0.12]
      can_iface: can2
      motor_ids: [3, 4, 5, 6]
      joint_signs: [1.0, 1.0, 1.0, 1.0]
      joint_offsets: [0.0, 0.0, 0.0, 0.0]
    right:
      enabled: true
      tip_link: rp_elbow_pitch_link
      joints:
        - rw_shoulder_pitch
        - rw_arm_roll
        - rw_arm_yaw
        - rw_elbow_pitch
      home_joint_positions: [0.0, 0.0, 0.0, 0.0]
      tool_offset_xyz: [0.0, 0.0, -0.12]
      can_iface: can3
      motor_ids: [13, 14, 15, 16]
      joint_signs: [1.0, 1.0, 1.0, 1.0]
      joint_offsets: [0.0, 0.0, 0.0, 0.0]

xr:
  missing_arm_policy: hold_last
  calibration:
    mode: per_arm_average
    scale: 1.0
    rotation_rpy_deg: [0.0, 0.0, 0.0]
    use_auto_translation_from_first_frame: true
    translation_xyz: [0.0, 0.0, 0.0]
    frame_count: 20

ik:
  position_tolerance_m: 0.015
  max_iterations: 80
  damping: 0.08
  max_step_rad: 0.20
  smoothness_weight: 0.06
  home_weight: 0.02
  jacobian_delta: 0.0001

csv_export:
  position_epsilon_rad: 0.003
  min_interval_ms: 30
  min_speed: 0.22
  max_speed: 1.6
  default_speed: 0.75
  accel_limit: 6.0
  speed_scale: 1.20
  accel_scale: 1.20
