      home_joint_positions: [0.0, 0.0, 0.0, 0.0]
      tool_offset_xyz: [0.0, 0.027, -0.181]
      task_space_scale_xyz: [0.90, 0.60, 0.90]
      workspace_relative_min_xyz: [-0.30, -0.20, -0.02]
      workspace_relative_max_xyz: [0.30, 0.29, 0.48]
      joint_blend_alpha: 1.0
      joint_velocity_limit_rad_s: [999.0, 999.0, 999.0, 999.0]
      can_iface: can2
      motor_ids: [3, 4, 5, 6]
      joint_signs: [1.0, 1.0, 1.0, 1.0]
      joint_offsets: [0.0, 0.0, 0.0, 0.0]
    right:
      enabled: true
      tip_link: rp_elbow_pitch_link
      joints:
        - rw_shoulder_pitch
        - rw_arm_roll
        - rw_arm_yaw
        - rw_elbow_pitch
      home_joint_positions: [0.0, 0.0, 0.0, 0.0]
      tool_offset_xyz: [0.0, -0.027, -0.181]
      task_space_scale_xyz: [0.85, 0.70, 0.90]
      workspace_relative_min_xyz: [-0.30, -0.29, -0.02]
      workspace_relative_max_xyz: [0.30, 0.20, 0.48]
      joint_blend_alpha: 1.0
      joint_velocity_limit_rad_s: [999.0, 999.0, 999.0, 999.0]
      can_iface: can3
      motor_ids: [13, 14, 15, 16]
      joint_signs: [1.0, 1.0, 1.0, 1.0]
      joint_offsets: [0.0, 0.0, 0.0, 0.0]

xr:
  missing_arm_policy: hold_last
  calibration:
    mode: per_arm_average
    scale: 1.0
    rotation_rpy_deg: [0.0, 0.0, 0.0]
    use_auto_translation_from_first_frame: true
    relative_input_zero_is_home: true
    translation_xyz: [0.0, 0.0, 0.0]
    frame_count: 20

ik:
  position_tolerance_m: 0.020
  max_iterations: 50
  damping: 0.08
  max_step_rad: 0.20
  smoothness_weight: 0.06
  home_weight: 0.02
  jacobian_delta: 0.0001
  multistart_seed_count: 4
  random_seed: 20260325
  coarse_search_samples: 48
  coarse_search_top_k: 2

csv_export:
  position_epsilon_rad: 0.003
  min_interval_ms: 30
  max_position_step_rad: 0.05
  trajectory_max_velocity_rad_s: 1.0
  trajectory_target_interval_ms: 20
  min_speed: 0.22
  max_speed: 1.6
  default_speed: 0.75
  accel_limit: 6.0
  speed_scale: 1.20
  accel_scale: 1.20
